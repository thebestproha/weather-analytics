<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Analytics</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="portal-shell">
    <div class="portal-nav">
      <div class="portal-tabs">
        <button class="active" data-view="set1">Set 1</button>
        <button data-view="set2">Set 2</button>
        <button data-view="compare">Compare</button>
      </div>
    </div>

    <iframe id="portalFrame" class="portal-frame" title="Weather View"></iframe>
  </div>

  <script>
    const frame = document.getElementById("portalFrame");
    const buttons = Array.from(document.querySelectorAll(".portal-tabs button"));
    const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
    const cacheBust = Date.now();

    const views = isLocal
      ? {
          set1: "http://127.0.0.1:5173/index.html",
          set2: "http://127.0.0.1:5174/index_model_c.html",
          compare: "http://127.0.0.1:5180/side_by_side_compare.html",
        }
      : {
          set1: "/frontend/index.html",
          set2: "/frontend/index_model_c.html",
          compare: "/compare-static/side_by_side_compare.html",
        };

    function withCacheBust(url) {
      const sep = url.includes("?") ? "&" : "?";
      return `${url}${sep}cb=${cacheBust}`;
    }

    function selectView(viewKey) {
      buttons.forEach((b) => b.classList.toggle("active", b.getAttribute("data-view") === viewKey));
      const target = views[viewKey] || views.set1;
      frame.src = withCacheBust(target);
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectView(btn.getAttribute("data-view"));
      });
    });

    selectView("set1");
  </script>
</body>
</html>
