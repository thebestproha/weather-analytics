services:
  - type: web
    name: weather-analytics-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEATHER_DB_PATH
        value: replica/weather.snapshot.sqlite
      - key: DISABLE_SCHEDULER
        value: "true"
